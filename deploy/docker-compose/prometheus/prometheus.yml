global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: hetzner-load-balancer-exporter
    static_configs:
      # 'exporter' is the service name on the compose network; port 8000 is
      # where the exporter serves Prometheus metrics.
      - targets: ["exporter:8000"]
